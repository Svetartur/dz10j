<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Завдання 5</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 50px;
        }
        .autocomplete-container {
            position: relative;
            width: 250px;
        }
        input {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
            font-size: 16px;
        }
        .suggestions-list {
            position: absolute;
            width: 100%;
            background: white;
            border: 1px solid #ccc;
            border-top: none;
            max-height: 150px;
            overflow-y: auto;
            margin: 0;
            padding: 0;
            list-style: none;
            display: none;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .suggestions-list li {
            padding: 8px;
            cursor: pointer;
        }
        .suggestions-list li:hover {
            background-color: #f0f0f0;
        }
    </style>
</head>
<body>

    <div class="autocomplete-container">
        <input type="text" id="country-input" placeholder="Введіть країну...">
        <ul id="suggestions" class="suggestions-list"></ul>
    </div>

    <script src="pickme.js"></script>
</body>
</html>
