<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Завдання 1</title>
    <style>
        .counter-container {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 50px;
        }
        input {
            width: 60px;
            text-align: center;
            font-size: 18px;
            padding: 5px;
        }
        button {
            padding: 5px 15px;
            font-size: 18px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="counter-container">
        <button id="btn-decrease">-</button>
        <input type="text" id="counter-input" value="0" readonly>
        <button id="btn-increase">+</button>
    </div>

    <script src="pickme.js"></script>
</body>
</html>
