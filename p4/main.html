<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Завдання 4</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 30px auto;
        }
        .article {
            border-bottom: 20px;
            margin-bottom: 30px;
        }
        .comments-section {
            margin-top: 30px;
        }
        .comment-item {
            border-bottom: 1px solid #eee;
            padding: 10px 0;
        }
        .comment-header {
            font-weight: bold;
            font-size: 14px;
            margin-bottom: 5px;
        }
        .comment-date {
            font-weight: normal;
            color: #888;
            font-size: 12px;
            margin-left: 10px;
        }
        .comment-text {
            color: #333;
        }
        form {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 30px;
            background: #f9f9f9;
            padding: 15px;
            border-radius: 5px;
        }
        input, textarea {
            padding: 8px;
            font-size: 14px;
        }
        button {
            padding: 10px;
            background-color: #28a745;
            color: white;
            border: none;
            cursor: pointer;
            font-size: 16px;
        }
    </style>
</head>
<body>

    <div class="article">
        <h1>Заголовок статті</h1>
        <p>Lorem ipsum dolor sit amet, consectetur adipiscing elit. Світ веб-розробки стрімко розвивається, і DOM є ключовою частиною взаємодії з користувачем.</p>
    </div>

    <div class="comments-section">
        <h3>Коментарі</h3>
        <div id="comments-list"></div>

        <form id="comment-form">
            <input type="text" id="username" placeholder="Ваше ім'я" required>
            <textarea id="comment-text" rows="4" placeholder="Ваш коментар" required></textarea>
            <button type="submit">Додати коментар</button>
        </form>
    </div>

    <script src="pickme.js"></script>
</body>
</html>
